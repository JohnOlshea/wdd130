<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Exciting Expeditions</title>
    <meta name="description"
      content="Contact Exciting Expeditions rafting company for reservations, inquiries, and trip information.">
    <meta name="author" content="John Oluseye Akala">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <!-- HEADER: CSS Grid for logo + nav side by side -->
    <header>
        <img src="images/logo.png" alt="Exciting Expeditions Logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>

        <section class="contact-header">
            <h1>White Water Rafting Company</h1>
            <p>123 Main River Street</p>
            <p>Kolob, California</p>
            <p>+1 999 999 9999</p>
            <p>info@whitewater.com</p>
        </section>

        <div class="contact-content">

            <!-- GOOGLE MAP -->
            <div class="map">
                <iframe src="https://www.google.com/maps?q=kolob+utah&output=embed" loading="lazy">
                </iframe>
            </div>

            <!-- CONTACT FORM -->


        </div>

        <!-- EMPLOYEE SECTION -->
        <section class="employees">

            <h2>We Are Here to Serve You</h2>

            <div class="employee-grid">

                <figure>
                    <img src="images/employee1.jpg" alt="Employee profile">
                    <figcaption>River Guide</figcaption>
                </figure>

                <figure>
                    <img src="images/employee2.jpg" alt="Employee profile">
                    <figcaption>Trip Coordinator</figcaption>
                </figure>

                <figure>
                    <img src="images/employee3.jpg" alt="Employee profile">
                    <figcaption>Customer Support</figcaption>
                </figure>

            </div>

        </section>

    </main>

    <!-- FOOTER: copyright left, social icons right -->
    <footer>
        <p>&copy;2026 | Exciting Expeditions | John Oluseye Akala</p>
        <nav class="socialmedia">
            <a href="https://facebook.com"><img src="images/facebook.png" alt="Facebook Icon"></a>
            <a href="https://twitter.com"><img src="images/twitter.png" alt="X (Twitter) Icon"></a>
            <a href="https://instagram.com"><img src="images/instagram.png"
                  alt="Instagram Icon"></a>
        </nav>
    </footer>

</body>

</html>
