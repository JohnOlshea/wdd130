<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Exciting Expeditions</title>
    <meta name="description"
      content="Contact Exciting Expeditions rafting company for reservations, inquiries, and trip information.">
    <meta name="author" content="John Oluseye Akala">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <!-- HEADER: CSS Grid for logo + nav side by side -->
    <header>
        <img src="images/logo.png" alt="Exciting Expeditions Logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>

        <section class="contact-header">
            <h1>White Water Rafting Company</h1>
            <p>123 Main River Street</p>
            <p>Kolob, California</p>
            <p>+1 999 999 9999</p>
            <p>info@whitewater.com</p>
        </section>

        <div class="contact-content">

            <!-- GOOGLE MAP -->
            <div class="map">
                <iframe src="https://www.google.com/maps?q=kolob+utah&output=embed" loading="lazy">
                </iframe>
            </div>

            <!-- CONTACT FORM -->
            <form class="contact-form">

                <div class="form-row">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Placeholder" required>
                </div>

                <div class="form-row">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Placeholder" required>
                </div>

                <fieldset class="radio-group">
                    <legend>Message Purpose</legend>

                    <label for="purpose-general">
                        <input type="radio" id="purpose-general" name="purpose" value="general"
                          required>
                        General Inquiry
                    </label>

                    <label for="purpose-reservation">
                        <input type="radio" id="purpose-reservation" name="purpose"
                          value="reservation">
                        Reservation Question
                    </label>

                    <label for="purpose-suggestion">
                        <input type="radio" id="purpose-suggestion" name="purpose"
                          value="suggestion">
                        Website Suggestion
                    </label>

                </fieldset>

                <div class="form-row">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" placeholder="Type here"
                      rows="4"></textarea>
                </div>

                <div class="checkbox">
                    <input type="checkbox" id="subscribe" name="subscribe">
                    <label for="subscribe">Please Subscribe me to the monthly newsletter</label>
                </div>

                <button type="submit">Get in Touch!</button>

            </form>

        </div>

        <!-- EMPLOYEE SECTION -->
        <section class="employees">

            <h2>We Are Here to Serve You</h2>

            <div class="employee-grid">

                <figure>
                    <img src="images/employee1.jpg" alt="Employee profile">
                    <figcaption>River Guide</figcaption>
                </figure>

                <figure>
                    <img src="images/employee2.jpg" alt="Employee profile">
                    <figcaption>Trip Coordinator</figcaption>
                </figure>

                <figure>
                    <img src="images/employee3.jpg" alt="Employee profile">
                    <figcaption>Customer Support</figcaption>
                </figure>

            </div>

        </section>

    </main>

    <!-- FOOTER: copyright left, social icons right -->
    <footer>
        <p>&copy;2026 | Exciting Expeditions | John Oluseye Akala</p>
        <nav class="socialmedia">
            <a href="https://facebook.com"><img src="images/facebook.png" alt="Facebook Icon"></a>
            <a href="https://twitter.com"><img src="images/twitter.png" alt="X (Twitter) Icon"></a>
            <a href="https://instagram.com"><img src="images/instagram.png"
                  alt="Instagram Icon"></a>
        </nav>
    </footer>

</body>

</html>
